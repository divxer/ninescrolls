<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glS" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.4" opacity="0.25"/>
    </pattern>
    <linearGradient id="barFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="checkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg3)"/>
  <rect width="800" height="500" fill="url(#grid3)"/>

  <!-- Left side: Plasma Cleaner silhouette -->
  <g transform="translate(160, 250)">
    <!-- Machine body -->
    <rect x="-90" y="-100" width="180" height="160" rx="10" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.5" opacity="0.8"/>
    <!-- Display panel -->
    <rect x="-70" y="-85" width="100" height="50" rx="5" fill="#0f2440" stroke="#3b82f6" stroke-width="1"/>
    <!-- Display content -->
    <text x="-20" y="-62" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#22d3ee" filter="url(#gl)">RF 200W</text>
    <text x="-20" y="-46" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#60a5fa">0.5 Torr</text>
    <!-- Chamber door -->
    <rect x="-70" y="-20" width="140" height="68" rx="6" fill="#0f2440" stroke="#3b82f6" stroke-width="1"/>
    <!-- Chamber window -->
    <ellipse cx="0" cy="14" rx="30" ry="20" fill="none" stroke="#60a5fa" stroke-width="1" opacity="0.6"/>
    <!-- Plasma glow through window -->
    <ellipse cx="0" cy="14" rx="20" ry="13" fill="#22d3ee" opacity="0.15" filter="url(#glS)"/>
    <circle cx="-5" cy="10" r="2" fill="#67e8f9" opacity="0.6" filter="url(#gl)"/>
    <circle cx="8" cy="16" r="1.5" fill="#a5f3fc" opacity="0.5" filter="url(#gl)"/>
    <circle cx="2" cy="6" r="1.8" fill="#22d3ee" opacity="0.5" filter="url(#gl)"/>
    <!-- Buttons -->
    <circle cx="50" cy="-70" r="6" fill="#1e40af" stroke="#60a5fa" stroke-width="1"/>
    <circle cx="50" cy="-52" r="6" fill="#1e40af" stroke="#60a5fa" stroke-width="1"/>
    <!-- Base -->
    <rect x="-95" y="60" width="190" height="20" rx="4" fill="#1e3a5f" stroke="#2563eb" stroke-width="1"/>
    <!-- Label -->
    <text x="0" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#60a5fa" font-weight="600">Plasma Cleaner</text>
  </g>

  <!-- Right side: Selection Checklist -->
  <g transform="translate(460, 80)">
    <!-- Checklist card -->
    <rect x="0" y="0" width="280" height="340" rx="14" fill="#1e3a5f" stroke="#2563eb" stroke-width="1.2" opacity="0.7"/>
    <text x="140" y="32" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e0f2fe" font-weight="700">Selection Checklist</text>
    <line x1="20" y1="45" x2="260" y2="45" stroke="#2563eb" stroke-width="0.8" opacity="0.5"/>

    <!-- Item 1: checked -->
    <g transform="translate(30, 65)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#065f46" stroke="#34d399" stroke-width="1.2"/>
      <polyline points="4,10 8,15 16,5" fill="none" stroke="#34d399" stroke-width="2.5" filter="url(#gl)"/>
      <text x="30" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#d1fae5" font-weight="600">Chamber Size</text>
      <!-- Progress bar -->
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="#0f2440"/>
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="url(#barFill)" opacity="0.8"/>
    </g>

    <!-- Item 2: checked -->
    <g transform="translate(30, 110)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#065f46" stroke="#34d399" stroke-width="1.2"/>
      <polyline points="4,10 8,15 16,5" fill="none" stroke="#34d399" stroke-width="2.5" filter="url(#gl)"/>
      <text x="30" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#d1fae5" font-weight="600">Plasma Type (RF/DC/MW)</text>
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="#0f2440"/>
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="url(#barFill)" opacity="0.8"/>
    </g>

    <!-- Item 3: checked -->
    <g transform="translate(30, 155)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#065f46" stroke="#34d399" stroke-width="1.2"/>
      <polyline points="4,10 8,15 16,5" fill="none" stroke="#34d399" stroke-width="2.5" filter="url(#gl)"/>
      <text x="30" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#d1fae5" font-weight="600">Vacuum System</text>
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="#0f2440"/>
      <rect x="30" y="20" width="160" height="5" rx="2.5" fill="url(#barFill)" opacity="0.8"/>
    </g>

    <!-- Item 4: in-progress -->
    <g transform="translate(30, 200)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2"/>
      <text x="30" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#93c5fd" font-weight="600">Process Control</text>
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="#0f2440"/>
      <rect x="30" y="20" width="120" height="5" rx="2.5" fill="url(#barFill)" opacity="0.6"/>
      <!-- Pulsing cursor -->
      <rect x="148" y="18" width="3" height="9" rx="1" fill="#67e8f9" filter="url(#gl)"/>
    </g>

    <!-- Item 5: pending -->
    <g transform="translate(30, 245)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#1e3a5f" stroke="#334155" stroke-width="1.2"/>
      <text x="30" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" font-weight="500">Gas Compatibility</text>
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="#0f2440"/>
    </g>

    <!-- Item 6: pending -->
    <g transform="translate(30, 290)">
      <rect x="0" y="0" width="20" height="20" rx="4" fill="#1e3a5f" stroke="#334155" stroke-width="1.2"/>
      <text x="30" y="14" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#64748b" font-weight="500">Budget &amp; ROI</text>
      <rect x="30" y="20" width="200" height="5" rx="2.5" fill="#0f2440"/>
    </g>
  </g>

  <!-- Connecting arrow from machine to checklist -->
  <g filter="url(#gl)">
    <path d="M 280 250 Q 350 250, 420 200" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>
    <path d="M 280 250 Q 350 250, 420 300" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,4"/>
  </g>

  <!-- Sparkle dots -->
  <g opacity="0.35">
    <circle cx="50" cy="50" r="1.5" fill="#67e8f9"/>
    <circle cx="750" cy="50" r="1" fill="#a5f3fc"/>
    <circle cx="40" cy="440" r="1.2" fill="#67e8f9"/>
    <circle cx="760" cy="460" r="1.5" fill="#a5f3fc"/>
    <circle cx="350" cy="30" r="1" fill="#67e8f9"/>
    <circle cx="380" cy="470" r="1.2" fill="#a5f3fc"/>
  </g>

  <!-- Circuit traces bottom-left -->
  <g stroke="#1e4976" stroke-width="1" fill="none" opacity="0.4">
    <path d="M 0 400 L 30 400 L 30 370 L 60 370"/>
    <circle cx="60" cy="370" r="2.5" fill="#1e4976"/>
    <path d="M 0 430 L 50 430 L 50 410 L 70 410"/>
    <circle cx="70" cy="410" r="2" fill="#1e4976"/>
  </g>
</svg>