<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="cardS">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Plasma Cleaner Applications Across Industries</text>

  <!-- Center hub -->
  <circle cx="450" cy="350" r="72" fill="url(#centerGrad)" filter="url(#cardS)"/>
  <text x="450" y="340" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Plasma</text>
  <text x="450" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Cleaner</text>

  <!-- Connection lines -->
  <g stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4">
    <line x1="378" y1="330" x2="240" y2="200"/>
    <line x1="450" y1="278" x2="450" y2="195"/>
    <line x1="522" y1="330" x2="660" y2="200"/>
    <line x1="378" y1="370" x2="240" y2="500"/>
    <line x1="450" y1="422" x2="450" y2="505"/>
    <line x1="522" y1="370" x2="660" y2="500"/>
  </g>

  <!-- ===== Card 1: Semiconductor (top-left) ===== -->
  <g transform="translate(40, 60)">
    <rect width="210" height="140" rx="12" fill="#fff" stroke="#3b82f6" stroke-width="1.5" filter="url(#cardS)"/>
    <rect width="210" height="36" rx="12" fill="#3b82f6"/>
    <rect y="20" width="210" height="16" fill="#3b82f6"/>
    <!-- Icon -->
    <rect x="14" y="9" width="18" height="18" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
    <line x1="14" y1="18" x2="32" y2="18" stroke="#fff" stroke-width="0.8"/>
    <line x1="23" y1="9" x2="23" y2="27" stroke="#fff" stroke-width="0.8"/>
    <text x="42" y="24" font-size="12" font-weight="700" fill="#fff">Semiconductor</text>

    <text x="15" y="57" font-size="10" fill="#334155">• Wafer surface preparation</text>
    <text x="15" y="75" font-size="10" fill="#334155">• Wire bonding pre-clean</text>
    <text x="15" y="93" font-size="10" fill="#334155">• Photoresist residue removal</text>
    <text x="15" y="111" font-size="10" fill="#334155">• PCB &amp; SMT preparation</text>
    <text x="15" y="132" font-size="9" fill="#3b82f6" font-weight="600">Gas: O₂, Ar, O₂/Ar mix</text>
  </g>

  <!-- ===== Card 2: Medical Devices (top-center) ===== -->
  <g transform="translate(345, 55)">
    <rect width="210" height="140" rx="12" fill="#fff" stroke="#ec4899" stroke-width="1.5" filter="url(#cardS)"/>
    <rect width="210" height="36" rx="12" fill="#ec4899"/>
    <rect y="20" width="210" height="16" fill="#ec4899"/>
    <!-- Icon -->
    <line x1="20" y1="11" x2="20" y2="27" stroke="#fff" stroke-width="2"/>
    <line x1="12" y1="19" x2="28" y2="19" stroke="#fff" stroke-width="2"/>
    <text x="38" y="24" font-size="12" font-weight="700" fill="#fff">Medical Devices</text>

    <text x="15" y="57" font-size="10" fill="#334155">• Implant biocompatibility</text>
    <text x="15" y="75" font-size="10" fill="#334155">• PDMS microfluidics bonding</text>
    <text x="15" y="93" font-size="10" fill="#334155">• Lab-on-a-chip fabrication</text>
    <text x="15" y="111" font-size="10" fill="#334155">• Pre-sterilization cleaning</text>
    <text x="15" y="132" font-size="9" fill="#ec4899" font-weight="600">Gas: O₂, H₂O₂ vapor</text>
  </g>

  <!-- ===== Card 3: Optics & Displays (top-right) ===== -->
  <g transform="translate(650, 60)">
    <rect width="210" height="140" rx="12" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#cardS)"/>
    <rect width="210" height="36" rx="12" fill="#f59e0b"/>
    <rect y="20" width="210" height="16" fill="#f59e0b"/>
    <!-- Icon -->
    <circle cx="20" cy="18" r="9" fill="none" stroke="#fff" stroke-width="1.5"/>
    <circle cx="20" cy="18" r="4" fill="#fff"/>
    <text x="38" y="24" font-size="12" font-weight="700" fill="#fff">Optics &amp; Displays</text>

    <text x="15" y="57" font-size="10" fill="#334155">• Lens &amp; optics pre-coating</text>
    <text x="15" y="75" font-size="10" fill="#334155">• ITO electrode cleaning</text>
    <text x="15" y="93" font-size="10" fill="#334155">• LCD/OLED substrate prep</text>
    <text x="15" y="111" font-size="10" fill="#334155">• Anti-reflection coating prep</text>
    <text x="15" y="132" font-size="9" fill="#d97706" font-weight="600">Gas: O₂/Ar (low power)</text>
  </g>

  <!-- ===== Card 4: Automotive & Aerospace (bottom-left) ===== -->
  <g transform="translate(40, 500)">
    <rect width="210" height="140" rx="12" fill="#fff" stroke="#16a34a" stroke-width="1.5" filter="url(#cardS)"/>
    <rect width="210" height="36" rx="12" fill="#16a34a"/>
    <rect y="20" width="210" height="16" fill="#16a34a"/>
    <!-- Icon -->
    <polygon points="20,10 12,26 28,26" fill="none" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="38" y="24" font-size="12" font-weight="700" fill="#fff">Auto &amp; Aerospace</text>

    <text x="15" y="57" font-size="10" fill="#334155">• Structural adhesive bonding</text>
    <text x="15" y="75" font-size="10" fill="#334155">• CFRP composite activation</text>
    <text x="15" y="93" font-size="10" fill="#334155">• Paint adhesion improvement</text>
    <text x="15" y="111" font-size="10" fill="#334155">• Dissimilar material joining</text>
    <text x="15" y="132" font-size="9" fill="#16a34a" font-weight="600">Gas: O₂, N₂, air plasma</text>
  </g>

  <!-- ===== Card 5: Materials Research (bottom-center) ===== -->
  <g transform="translate(345, 505)">
    <rect width="210" height="140" rx="12" fill="#fff" stroke="#8b5cf6" stroke-width="1.5" filter="url(#cardS)"/>
    <rect width="210" height="36" rx="12" fill="#8b5cf6"/>
    <rect y="20" width="210" height="16" fill="#8b5cf6"/>
    <!-- Icon -->
    <circle cx="16" cy="22" r="6" fill="none" stroke="#fff" stroke-width="1.2"/>
    <circle cx="24" cy="14" r="6" fill="none" stroke="#fff" stroke-width="1.2"/>
    <text x="38" y="24" font-size="12" font-weight="700" fill="#fff">Materials Research</text>

    <text x="15" y="57" font-size="10" fill="#334155">• TEM/SEM sample prep</text>
    <text x="15" y="75" font-size="10" fill="#334155">• Surface science studies</text>
    <text x="15" y="93" font-size="10" fill="#334155">• MEMS &amp; nanofabrication</text>
    <text x="15" y="111" font-size="10" fill="#334155">• Thin film substrate cleaning</text>
    <text x="15" y="132" font-size="9" fill="#7c3aed" font-weight="600">Gas: O₂, Ar, H₂, custom</text>
  </g>

  <!-- ===== Card 6: Polymers & Textiles (bottom-right) ===== -->
  <g transform="translate(650, 500)">
    <rect width="210" height="140" rx="12" fill="#fff" stroke="#06b6d4" stroke-width="1.5" filter="url(#cardS)"/>
    <rect width="210" height="36" rx="12" fill="#06b6d4"/>
    <rect y="20" width="210" height="16" fill="#06b6d4"/>
    <!-- Icon -->
    <path d="M12,14 Q20,8 28,14 Q20,20 12,14" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M12,22 Q20,16 28,22 Q20,28 12,22" fill="none" stroke="#fff" stroke-width="1.5"/>
    <text x="38" y="24" font-size="12" font-weight="700" fill="#fff">Polymers &amp; Textiles</text>

    <text x="15" y="57" font-size="10" fill="#334155">• PE/PP/PTFE activation</text>
    <text x="15" y="75" font-size="10" fill="#334155">• Improved printability</text>
    <text x="15" y="93" font-size="10" fill="#334155">• Coating &amp; paint adhesion</text>
    <text x="15" y="111" font-size="10" fill="#334155">• Textile functionalization</text>
    <text x="15" y="132" font-size="9" fill="#0891b2" font-weight="600">Gas: O₂, N₂, CF₄</text>
  </g>
</svg>