<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Glow filters -->
    <filter id="glow1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Plasma gradient -->
    <radialGradient id="plasmaGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="chamberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
    <linearGradient id="electrodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Subtle circuit traces in corners -->
  <g stroke="#1e4976" stroke-width="1.2" fill="none" opacity="0.5">
    <!-- Top-left traces -->
    <path d="M 0 80 L 40 80 L 40 40 L 80 40"/>
    <circle cx="80" cy="40" r="3" fill="#1e4976"/>
    <path d="M 0 120 L 60 120 L 60 60 L 100 60"/>
    <circle cx="100" cy="60" r="2.5" fill="#1e4976"/>
    <!-- Bottom-right traces -->
    <path d="M 800 420 L 760 420 L 760 460 L 720 460"/>
    <circle cx="720" cy="460" r="3" fill="#1e4976"/>
    <path d="M 800 380 L 740 380 L 740 440 L 700 440"/>
    <circle cx="700" cy="440" r="2.5" fill="#1e4976"/>
  </g>

  <!-- ===== Plasma Chamber (center) ===== -->
  <!-- Chamber outer shell -->
  <rect x="230" y="100" width="340" height="280" rx="18" fill="url(#chamberGrad)" stroke="#2563eb" stroke-width="1.5" opacity="0.85"/>
  <!-- Chamber inner wall glow -->
  <rect x="245" y="115" width="310" height="250" rx="12" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.4"/>

  <!-- Plasma glow region -->
  <ellipse cx="400" cy="240" rx="130" ry="90" fill="url(#plasmaGlow)"/>

  <!-- Top electrode -->
  <rect x="310" y="120" width="180" height="14" rx="3" fill="url(#electrodeGrad)" stroke="#60a5fa" stroke-width="1" filter="url(#glow1)"/>
  <text x="400" y="112" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#93c5fd" font-weight="600">RF Electrode</text>

  <!-- Bottom electrode (grounded) -->
  <rect x="310" y="346" width="180" height="14" rx="3" fill="url(#electrodeGrad)" stroke="#60a5fa" stroke-width="1" filter="url(#glow1)"/>
  <text x="400" y="380" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#93c5fd" font-weight="600">Ground Electrode</text>

  <!-- Substrate on bottom electrode -->
  <rect x="340" y="330" width="120" height="16" rx="2" fill="#1e40af" stroke="#60a5fa" stroke-width="1"/>
  <text x="400" y="342" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#bfdbfe">Substrate</text>

  <!-- Plasma particles (glowing dots) -->
  <g filter="url(#glow2)">
    <circle cx="350" cy="200" r="2.5" fill="#67e8f9" opacity="0.9"/>
    <circle cx="420" cy="180" r="2" fill="#a5f3fc" opacity="0.8"/>
    <circle cx="380" cy="230" r="3" fill="#22d3ee" opacity="0.85"/>
    <circle cx="440" cy="210" r="2" fill="#67e8f9" opacity="0.7"/>
    <circle cx="360" cy="260" r="2.5" fill="#a5f3fc" opacity="0.8"/>
    <circle cx="410" cy="250" r="1.8" fill="#22d3ee" opacity="0.9"/>
    <circle cx="450" cy="270" r="2.2" fill="#67e8f9" opacity="0.7"/>
    <circle cx="330" cy="240" r="1.5" fill="#a5f3fc" opacity="0.8"/>
    <circle cx="390" cy="290" r="2" fill="#22d3ee" opacity="0.75"/>
    <circle cx="430" cy="300" r="1.8" fill="#67e8f9" opacity="0.8"/>
    <circle cx="370" cy="310" r="2.5" fill="#a5f3fc" opacity="0.7"/>
    <circle cx="345" cy="175" r="1.8" fill="#22d3ee" opacity="0.6"/>
    <circle cx="460" cy="240" r="2" fill="#67e8f9" opacity="0.65"/>
    <circle cx="320" cy="210" r="2.2" fill="#a5f3fc" opacity="0.7"/>
  </g>

  <!-- Plasma lightning bolts -->
  <g stroke="#67e8f9" stroke-width="1.5" fill="none" filter="url(#glowSoft)" opacity="0.6">
    <polyline points="370,140 365,180 375,200 360,240 370,280 365,320 370,340"/>
    <polyline points="420,140 425,170 415,210 430,250 420,290 425,340"/>
    <polyline points="395,140 390,190 400,220 388,260 395,310 400,340"/>
  </g>

  <!-- Gas inlet (top) -->
  <g>
    <line x1="400" y1="60" x2="400" y2="100" stroke="#3b82f6" stroke-width="2" filter="url(#glow1)"/>
    <polygon points="392,75 400,60 408,75" fill="#3b82f6" filter="url(#glow1)"/>
    <text x="400" y="52" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#60a5fa" font-weight="600">O₂ / Ar / N₂</text>
  </g>

  <!-- Vacuum pump (bottom) -->
  <g>
    <line x1="400" y1="380" x2="400" y2="430" stroke="#3b82f6" stroke-width="2" filter="url(#glow1)"/>
    <polygon points="392,415 400,430 408,415" fill="#3b82f6" filter="url(#glow1)"/>
    <text x="400" y="450" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#60a5fa" font-weight="600">Vacuum Pump</text>
  </g>

  <!-- RF power supply (left) -->
  <g>
    <line x1="160" y1="127" x2="230" y2="127" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" filter="url(#glow1)"/>
    <rect x="90" y="110" width="70" height="34" rx="6" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="125" y="124" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#fbbf24" font-weight="600">RF Power</text>
    <text x="125" y="137" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#fcd34d">13.56 MHz</text>
    <!-- Sine wave symbol -->
    <path d="M 98 145 Q 105 138, 112 145 Q 119 152, 125 145 Q 132 138, 139 145 Q 146 152, 152 145" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Matching network (left, lower) -->
  <g>
    <line x1="160" y1="200" x2="230" y2="200" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,3"/>
    <rect x="85" y="185" width="75" height="30" rx="6" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1"/>
    <text x="122" y="204" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#c4b5fd" font-weight="500">Matching</text>
  </g>

  <!-- Pressure gauge (right) -->
  <g>
    <line x1="570" y1="160" x2="640" y2="160" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3"/>
    <rect x="640" y="145" width="75" height="30" rx="6" fill="#1e3a5f" stroke="#34d399" stroke-width="1"/>
    <text x="677" y="164" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="500">Pressure</text>
  </g>

  <!-- MFC (right, lower) -->
  <g>
    <line x1="570" y1="230" x2="640" y2="230" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3"/>
    <rect x="640" y="215" width="75" height="30" rx="6" fill="#1e3a5f" stroke="#34d399" stroke-width="1"/>
    <text x="677" y="234" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#6ee7b7" font-weight="500">MFC</text>
  </g>

  <!-- Floating sparkle dots -->
  <g opacity="0.4">
    <circle cx="120" cy="350" r="1.5" fill="#67e8f9"/>
    <circle cx="680" cy="90" r="1" fill="#67e8f9"/>
    <circle cx="720" cy="350" r="1.5" fill="#a5f3fc"/>
    <circle cx="80" cy="280" r="1" fill="#67e8f9"/>
    <circle cx="750" cy="150" r="1.2" fill="#a5f3fc"/>
    <circle cx="60" cy="150" r="1.5" fill="#67e8f9"/>
    <circle cx="200" cy="420" r="1" fill="#a5f3fc"/>
    <circle cx="650" cy="410" r="1.2" fill="#67e8f9"/>
  </g>
</svg>