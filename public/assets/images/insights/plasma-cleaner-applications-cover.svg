<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="50%" stop-color="#0f1f38"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.4" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg2)"/>
  <rect width="800" height="500" fill="url(#grid2)"/>
  <ellipse cx="400" cy="250" rx="250" ry="200" fill="url(#centerGlow)"/>

  <!-- Connection lines from center to each industry node -->
  <g stroke="#2563eb" stroke-width="1.5" opacity="0.5" filter="url(#glow)">
    <line x1="400" y1="250" x2="150" y2="110"/>
    <line x1="400" y1="250" x2="400" y2="70"/>
    <line x1="400" y1="250" x2="650" y2="110"/>
    <line x1="400" y1="250" x2="150" y2="390"/>
    <line x1="400" y1="250" x2="400" y2="430"/>
    <line x1="400" y1="250" x2="650" y2="390"/>
  </g>

  <!-- Animated data dots on lines -->
  <g fill="#67e8f9" opacity="0.7">
    <circle cx="275" cy="180" r="2.5"/>
    <circle cx="400" cy="160" r="2"/>
    <circle cx="525" cy="180" r="2.5"/>
    <circle cx="275" cy="320" r="2"/>
    <circle cx="400" cy="340" r="2.5"/>
    <circle cx="525" cy="320" r="2"/>
  </g>

  <!-- ===== Center: Plasma Cleaner Hub ===== -->
  <circle cx="400" cy="250" r="52" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2" filter="url(#glow)"/>
  <circle cx="400" cy="250" r="42" fill="#0f2440" stroke="#60a5fa" stroke-width="1"/>
  <!-- Plasma icon in center -->
  <g transform="translate(400, 250)" filter="url(#glow)">
    <circle cx="0" cy="0" r="8" fill="#22d3ee" opacity="0.7"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#67e8f9" stroke-width="1.2" opacity="0.5"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#67e8f9" stroke-width="0.8" opacity="0.3"/>
    <!-- Orbiting particles -->
    <circle cx="16" cy="0" r="3" fill="#a5f3fc"/>
    <circle cx="-10" cy="13" r="2.5" fill="#67e8f9"/>
    <circle cx="-6" cy="-15" r="2.5" fill="#22d3ee"/>
  </g>
  <text x="400" y="296" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#93c5fd" font-weight="600">PLASMA</text>

  <!-- ===== Industry Node 1: Semiconductor (top-left) ===== -->
  <g transform="translate(150, 110)">
    <rect x="-55" y="-35" width="110" height="70" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow)"/>
    <!-- Chip icon -->
    <rect x="-14" y="-18" width="28" height="28" rx="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <rect x="-8" y="-12" width="16" height="16" rx="1" fill="#2563eb" opacity="0.5"/>
    <!-- Pins -->
    <line x1="-14" y1="-8" x2="-22" y2="-8" stroke="#60a5fa" stroke-width="1"/>
    <line x1="-14" y1="0" x2="-22" y2="0" stroke="#60a5fa" stroke-width="1"/>
    <line x1="-14" y1="6" x2="-22" y2="6" stroke="#60a5fa" stroke-width="1"/>
    <line x1="14" y1="-8" x2="22" y2="-8" stroke="#60a5fa" stroke-width="1"/>
    <line x1="14" y1="0" x2="22" y2="0" stroke="#60a5fa" stroke-width="1"/>
    <line x1="14" y1="6" x2="22" y2="6" stroke="#60a5fa" stroke-width="1"/>
    <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#93c5fd" font-weight="600">Semiconductor</text>
  </g>

  <!-- ===== Industry Node 2: Medical (top-center) ===== -->
  <g transform="translate(400, 70)">
    <rect x="-55" y="-35" width="110" height="70" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow)"/>
    <!-- Cross icon -->
    <rect x="-4" y="-18" width="8" height="24" rx="2" fill="#22d3ee" opacity="0.7"/>
    <rect x="-12" y="-10" width="24" height="8" rx="2" fill="#22d3ee" opacity="0.7"/>
    <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#93c5fd" font-weight="600">Medical</text>
  </g>

  <!-- ===== Industry Node 3: Optics (top-right) ===== -->
  <g transform="translate(650, 110)">
    <rect x="-55" y="-35" width="110" height="70" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow)"/>
    <!-- Lens icon -->
    <ellipse cx="0" cy="-4" rx="18" ry="14" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="-28" y1="-4" x2="-18" y2="-4" stroke="#67e8f9" stroke-width="1.2"/>
    <line x1="18" y1="-4" x2="28" y2="-4" stroke="#67e8f9" stroke-width="1.2"/>
    <!-- Light rays -->
    <line x1="18" y1="-10" x2="28" y2="-14" stroke="#67e8f9" stroke-width="0.8" opacity="0.6"/>
    <line x1="18" y1="2" x2="28" y2="6" stroke="#67e8f9" stroke-width="0.8" opacity="0.6"/>
    <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#93c5fd" font-weight="600">Optics</text>
  </g>

  <!-- ===== Industry Node 4: Automotive (bottom-left) ===== -->
  <g transform="translate(150, 390)">
    <rect x="-55" y="-35" width="110" height="70" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow)"/>
    <!-- Gear icon -->
    <circle cx="0" cy="-4" r="10" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="0" cy="-4" r="5" fill="#2563eb" opacity="0.5"/>
    <!-- Gear teeth -->
    <rect x="-2" y="-18" width="4" height="6" rx="1" fill="#60a5fa"/>
    <rect x="-2" y="4" width="4" height="6" rx="1" fill="#60a5fa"/>
    <rect x="-16" y="-6" width="6" height="4" rx="1" fill="#60a5fa"/>
    <rect x="10" y="-6" width="6" height="4" rx="1" fill="#60a5fa"/>
    <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#93c5fd" font-weight="600">Auto/Aero</text>
  </g>

  <!-- ===== Industry Node 5: Research (bottom-center) ===== -->
  <g transform="translate(400, 430)">
    <rect x="-55" y="-35" width="110" height="70" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow)"/>
    <!-- Flask icon -->
    <path d="M -5,-18 L -5,-6 L -16,8 L 16,8 L 5,-6 L 5,-18 Z" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
    <line x1="-7" y1="-18" x2="7" y2="-18" stroke="#60a5fa" stroke-width="1.5"/>
    <ellipse cx="0" cy="2" rx="10" ry="4" fill="#22d3ee" opacity="0.3"/>
    <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#93c5fd" font-weight="600">Research</text>
  </g>

  <!-- ===== Industry Node 6: Polymers (bottom-right) ===== -->
  <g transform="translate(650, 390)">
    <rect x="-55" y="-35" width="110" height="70" rx="12" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.2" filter="url(#glow)"/>
    <!-- Molecule/chain icon -->
    <circle cx="-12" cy="-6" r="6" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
    <circle cx="4" cy="-12" r="5" fill="none" stroke="#67e8f9" stroke-width="1.3"/>
    <circle cx="14" cy="0" r="6" fill="none" stroke="#60a5fa" stroke-width="1.3"/>
    <line x1="-7" y1="-9" x2="0" y2="-11" stroke="#60a5fa" stroke-width="1"/>
    <line x1="8" y1="-9" x2="10" y2="-4" stroke="#60a5fa" stroke-width="1"/>
    <text x="0" y="28" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#93c5fd" font-weight="600">Polymers</text>
  </g>

  <!-- Sparkle dots -->
  <g opacity="0.35">
    <circle cx="50" cy="50" r="1.5" fill="#67e8f9"/>
    <circle cx="750" cy="60" r="1" fill="#a5f3fc"/>
    <circle cx="70" cy="450" r="1.2" fill="#67e8f9"/>
    <circle cx="740" cy="460" r="1.5" fill="#a5f3fc"/>
    <circle cx="250" cy="470" r="1" fill="#67e8f9"/>
    <circle cx="550" cy="30" r="1.2" fill="#a5f3fc"/>
    <circle cx="280" cy="30" r="1" fill="#67e8f9"/>
    <circle cx="580" cy="470" r="1" fill="#a5f3fc"/>
  </g>
</svg>