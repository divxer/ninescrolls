<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="ds">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrD" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <marker id="arrN" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Plasma Cleaner Selection Flowchart</text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#64748b">Choose the right system for your application</text>

  <!-- ===== START node ===== -->
  <rect x="350" y="75" width="200" height="42" rx="21" fill="#3b82f6" filter="url(#ds)"/>
  <text x="450" y="101" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">What is your substrate?</text>

  <!-- Arrow down from start to decision 1 -->
  <line x1="450" y1="117" x2="450" y2="148" stroke="#64748b" stroke-width="2" marker-end="url(#arrD)"/>

  <!-- ===== Decision 1: Conductive or Insulating? ===== -->
  <g transform="translate(450, 195)">
    <polygon points="0,-47 150,0 0,47 -150,0" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#ds)"/>
    <text x="0" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Is your substrate</text>
    <text x="0" y="8" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">conductive only?</text>
  </g>

  <!-- YES branch (left) — L-shaped path to Budget diamond -->
  <path d="M 300 195 L 115 195 L 115 273" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrY)"/>
  <rect x="195" y="183" width="35" height="18" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="212" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">Yes</text>

  <!-- NO branch (right) — L-shaped path to Damage diamond -->
  <path d="M 600 195 L 750 195 L 750 273" fill="none" stroke="#dc2626" stroke-width="2" marker-end="url(#arrN)"/>
  <rect x="655" y="183" width="28" height="18" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="669" y="196" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">No</text>

  <g transform="translate(115, 320)">
    <polygon points="0,-47 130,0 0,47 -130,0" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#ds)"/>
    <text x="0" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Is budget a</text>
    <text x="0" y="8" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">primary concern?</text>
  </g>

  <!-- YES → DC Plasma -->
  <line x1="115" y1="367" x2="115" y2="418" stroke="#16a34a" stroke-width="2" marker-end="url(#arrY)"/>
  <rect x="125" y="380" width="35" height="18" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="142" y="393" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">Yes</text>

  <rect x="30" y="420" width="170" height="65" rx="12" fill="#16a34a" filter="url(#ds)"/>
  <text x="115" y="446" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">DC Plasma</text>
  <text x="115" y="466" text-anchor="middle" font-size="10" fill="#bbf7d0">Simple &amp; cost-effective</text>
  <text x="115" y="478" text-anchor="middle" font-size="9" fill="#bbf7d0">Conductive substrates only</text>

  <!-- NO from budget → RF Plasma (right then down) -->
  <path d="M 245 320 L 380 320 L 380 418" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrD)"/>
  <rect x="248" y="308" width="28" height="18" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="262" y="321" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">No</text>

  <!-- ===== RIGHT: Damage sensitivity question ===== -->
  <g transform="translate(750, 320)">
    <polygon points="0,-47 130,0 0,47 -130,0" fill="#fff" stroke="#f59e0b" stroke-width="2" filter="url(#ds)"/>
    <text x="0" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Is substrate very</text>
    <text x="0" y="8" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">damage-sensitive?</text>
  </g>

  <!-- YES → Microwave -->
  <line x1="750" y1="367" x2="750" y2="418" stroke="#16a34a" stroke-width="2" marker-end="url(#arrY)"/>
  <rect x="760" y="380" width="35" height="18" rx="4" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="777" y="393" text-anchor="middle" font-size="10" font-weight="700" fill="#16a34a">Yes</text>

  <rect x="665" y="420" width="170" height="65" rx="12" fill="#9333ea" filter="url(#ds)"/>
  <text x="750" y="446" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Microwave Plasma</text>
  <text x="750" y="466" text-anchor="middle" font-size="10" fill="#e9d5ff">Minimal ion damage</text>
  <text x="750" y="478" text-anchor="middle" font-size="9" fill="#e9d5ff">High radical density, electrode-free</text>

  <!-- NO → RF Plasma (left then down) -->
  <path d="M 620 320 L 495 320 L 495 418" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrD)"/>
  <rect x="580" y="308" width="28" height="18" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="594" y="321" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">No</text>

  <!-- ===== RF Plasma (center result) ===== -->
  <rect x="275" y="420" width="325" height="65" rx="12" fill="#3b82f6" filter="url(#ds)"/>
  <text x="437" y="446" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">RF Plasma Cleaner</text>
  <text x="437" y="466" text-anchor="middle" font-size="10" fill="#bfdbfe">Most versatile — industry standard</text>
  <text x="437" y="478" text-anchor="middle" font-size="9" fill="#bfdbfe">All substrates, excellent uniformity, multiple gases</text>

  <!-- ===== Additional considerations (bottom) ===== -->
  <rect x="80" y="530" width="740" height="145" rx="12" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#ds)"/>
  <text x="450" y="555" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">After Choosing Plasma Type — Also Consider:</text>

  <g transform="translate(110, 575)">
    <!-- Item 1 -->
    <rect x="0" y="0" width="155" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="78" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Chamber Size</text>
    <text x="78" y="36" text-anchor="middle" font-size="9" fill="#64748b">Match to your typical</text>
    <text x="78" y="48" text-anchor="middle" font-size="9" fill="#64748b">workload volume</text>

    <!-- Item 2 -->
    <rect x="175" y="0" width="155" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="253" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Vacuum System</text>
    <text x="253" y="36" text-anchor="middle" font-size="9" fill="#64748b">Oil-sealed vs. dry pump</text>
    <text x="253" y="48" text-anchor="middle" font-size="9" fill="#64748b">affects cleanliness</text>

    <!-- Item 3 -->
    <rect x="350" y="0" width="155" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="428" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Process Control</text>
    <text x="428" y="36" text-anchor="middle" font-size="9" fill="#64748b">MFCs, endpoint detection</text>
    <text x="428" y="48" text-anchor="middle" font-size="9" fill="#64748b">&amp; recipe management</text>

    <!-- Item 4 -->
    <rect x="525" y="0" width="155" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="603" y="20" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Total Cost</text>
    <text x="603" y="36" text-anchor="middle" font-size="9" fill="#64748b">Equipment + gas + maintenance</text>
    <text x="603" y="48" text-anchor="middle" font-size="9" fill="#64748b">+ facility requirements</text>
  </g>
</svg>