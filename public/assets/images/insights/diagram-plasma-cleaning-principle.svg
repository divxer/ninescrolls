<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 680" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="chamberGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#c5cfe0"/>
    </linearGradient>
    <linearGradient id="plasmaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="electrodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="substrateGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">How Plasma Cleaning Works</text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#64748b">Schematic of a parallel-plate RF plasma cleaning system</text>

  <!-- Gas label (above chamber, with clear spacing) -->
  <text x="390" y="78" text-anchor="middle" font-size="10" fill="#059669" font-weight="600">O₂ / Ar / N₂</text>
  <!-- Gas inlet box -->
  <rect x="345" y="86" width="90" height="20" rx="6" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <text x="390" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Gas Inlet</text>
  <!-- Gas inlet dashed line -->
  <line x1="390" y1="106" x2="390" y2="125" stroke="#10b981" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Chamber body -->
  <rect x="160" y="125" width="440" height="340" rx="16" fill="url(#chamberGrad)" stroke="#94a3b8" stroke-width="2.5" filter="url(#shadow)"/>
  <!-- Chamber inner wall highlight -->
  <rect x="175" y="140" width="410" height="310" rx="10" fill="none" stroke="#fff" stroke-width="1" opacity="0.5"/>

  <!-- Powered Electrode label (above electrode, inside chamber) -->
  <text x="390" y="158" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Powered Electrode (RF)</text>
  <!-- Top electrode -->
  <rect x="220" y="164" width="340" height="16" rx="4" fill="url(#electrodeGrad)" stroke="#475569" stroke-width="1"/>

  <!-- Plasma glow region -->
  <rect x="220" y="190" width="340" height="175" rx="12" fill="url(#plasmaGrad)"/>

  <!-- Plasma species (ions, radicals, electrons) -->
  <g filter="url(#glow)">
    <!-- UV photons (top of plasma region) -->
    <g stroke="#eab308" stroke-width="1.5" fill="none" opacity="0.7">
      <path d="M270,200 Q275,210 280,200 Q285,210 290,200"/>
      <path d="M410,200 Q415,210 420,200 Q425,210 430,200"/>
      <path d="M340,202 Q345,212 350,202 Q355,212 360,202"/>
    </g>
    <text x="298" y="205" font-size="8" fill="#ca8a04" font-weight="500">UV</text>

    <!-- Ions (+) -->
    <g fill="#a855f7" font-size="12" font-weight="700">
      <text x="240" y="235">O⁺</text>
      <text x="350" y="225">O⁺</text>
      <text x="460" y="240">Ar⁺</text>
      <text x="300" y="275">Ar⁺</text>
      <text x="500" y="285">O⁺</text>
    </g>
    <!-- Radicals (•) -->
    <g fill="#ec4899" font-size="11" font-weight="600">
      <text x="275" y="260">O•</text>
      <text x="400" y="248">O•</text>
      <text x="510" y="260">O•</text>
      <text x="330" y="305">O•</text>
      <text x="445" y="315">O•</text>
    </g>
    <!-- Electrons (e⁻) -->
    <g fill="#3b82f6" font-size="9" font-weight="600">
      <text x="235" y="300">e⁻</text>
      <text x="375" y="265">e⁻</text>
      <text x="475" y="225">e⁻</text>
      <text x="530" y="310">e⁻</text>
    </g>
  </g>

  <!-- Volatile byproducts rising -->
  <g opacity="0.6">
    <text x="240" y="340" font-size="9" fill="#6b7280" font-style="italic">CO₂↑</text>
    <text x="380" y="335" font-size="9" fill="#6b7280" font-style="italic">H₂O↑</text>
    <text x="500" y="342" font-size="9" fill="#6b7280" font-style="italic">CO₂↑</text>
  </g>

  <!-- Contaminant dots (above substrate) -->
  <g opacity="0.8">
    <circle cx="310" cy="356" r="3" fill="#ef4444"/>
    <circle cx="335" cy="354" r="2.5" fill="#ef4444"/>
    <circle cx="360" cy="355" r="3" fill="#ef4444"/>
    <circle cx="390" cy="353" r="2.5" fill="#ef4444"/>
    <circle cx="415" cy="356" r="3" fill="#ef4444"/>
    <circle cx="440" cy="354" r="2" fill="#ef4444"/>
    <circle cx="465" cy="355" r="3" fill="#ef4444"/>
  </g>

  <!-- Substrate on bottom electrode -->
  <rect x="290" y="360" width="200" height="14" rx="3" fill="url(#substrateGrad)" stroke="#1d4ed8" stroke-width="1"/>
  <text x="390" y="370" text-anchor="middle" font-size="8" font-weight="600" fill="#fff">Substrate</text>

  <!-- Contaminants label (to the right, outside substrate) -->
  <line x1="470" y1="355" x2="510" y2="348" stroke="#dc2626" stroke-width="1" opacity="0.6"/>
  <text x="515" y="351" font-size="9" fill="#dc2626" font-weight="500">Contaminants</text>

  <!-- Bottom electrode -->
  <rect x="220" y="380" width="340" height="16" rx="4" fill="url(#electrodeGrad)" stroke="#475569" stroke-width="1"/>
  <!-- Grounded Electrode label (below electrode) -->
  <text x="390" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Grounded Electrode</text>

  <!-- Ground symbol (right side of bottom electrode) -->
  <g transform="translate(570, 388)">
    <line x1="0" y1="0" x2="30" y2="0" stroke="#475569" stroke-width="2"/>
    <line x1="30" y1="-8" x2="30" y2="8" stroke="#475569" stroke-width="2"/>
    <line x1="36" y1="-5" x2="36" y2="5" stroke="#475569" stroke-width="2"/>
    <line x1="42" y1="-2" x2="42" y2="2" stroke="#475569" stroke-width="2"/>
  </g>
  <text x="625" y="392" font-size="9" fill="#475569">Ground</text>

  <!-- RF Generator (right side) -->
  <rect x="660" y="150" width="120" height="58" rx="8" fill="#fff" stroke="#f97316" stroke-width="2" filter="url(#shadow)"/>
  <text x="720" y="175" text-anchor="middle" font-size="12" font-weight="700" fill="#f97316">RF Generator</text>
  <text x="720" y="192" text-anchor="middle" font-size="10" fill="#9a3412">13.56 MHz</text>
  <!-- RF connection line -->
  <line x1="660" y1="172" x2="565" y2="172" stroke="#f97316" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <!-- RF wave symbol on connection line -->
  <path d="M600,162 Q605,172 610,162 Q615,172 620,162 Q625,172 630,162" stroke="#f97316" stroke-width="1.5" fill="none"/>

  <!-- Matching Network -->
  <rect x="660" y="230" width="120" height="46" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="720" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Matching</text>
  <text x="720" y="264" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Network</text>
  <line x1="720" y1="208" x2="720" y2="230" stroke="#64748b" stroke-width="1.5"/>

  <!-- Vacuum pump (bottom) -->
  <line x1="390" y1="465" x2="390" y2="492" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="390" y="485" text-anchor="middle" font-size="9" fill="#64748b">0.1–1 Torr</text>
  <rect x="340" y="495" width="100" height="38" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="518" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Vacuum Pump</text>

  <!-- Legend (bottom section) -->
  <rect x="40" y="560" width="820" height="105" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="586" font-size="13" font-weight="700" fill="#1e293b">Process Steps</text>

  <!-- Step 1 -->
  <circle cx="75" cy="616" r="14" fill="#f97316" opacity="0.9"/>
  <text x="75" y="621" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">1</text>
  <text x="95" y="611" font-size="10" font-weight="600" fill="#1e293b">Pump Down</text>
  <text x="95" y="626" font-size="9" fill="#64748b">Chamber evacuated to</text>
  <text x="95" y="638" font-size="9" fill="#64748b">low pressure</text>

  <!-- Step 2 -->
  <circle cx="275" cy="616" r="14" fill="#10b981" opacity="0.9"/>
  <text x="275" y="621" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">2</text>
  <text x="295" y="611" font-size="10" font-weight="600" fill="#1e293b">Gas Introduction</text>
  <text x="295" y="626" font-size="9" fill="#64748b">Process gas flows</text>
  <text x="295" y="638" font-size="9" fill="#64748b">into chamber</text>

  <!-- Step 3 -->
  <circle cx="475" cy="616" r="14" fill="#a855f7" opacity="0.9"/>
  <text x="475" y="621" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">3</text>
  <text x="495" y="611" font-size="10" font-weight="600" fill="#1e293b">Plasma Ignition</text>
  <text x="495" y="626" font-size="9" fill="#64748b">RF field ionizes</text>
  <text x="495" y="638" font-size="9" fill="#64748b">gas molecules</text>

  <!-- Step 4 -->
  <circle cx="670" cy="616" r="14" fill="#3b82f6" opacity="0.9"/>
  <text x="670" y="621" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">4</text>
  <text x="690" y="611" font-size="10" font-weight="600" fill="#1e293b">Surface Cleaning</text>
  <text x="690" y="626" font-size="9" fill="#64748b">Reactive species remove</text>
  <text x="690" y="638" font-size="9" fill="#64748b">contaminants</text>

  <!-- Arrows between steps -->
  <line x1="190" y1="616" x2="258" y2="616" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="395" y1="616" x2="458" y2="616" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="590" y1="616" x2="653" y2="616" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrowGray)"/>
</svg>