version: 1
backend:
  phases:
    build:
      commands:
        # `npm ci` is safe now that the lockfile is platform-complete: the linux-x64
        # native binaries that were missing package nodes under the macOS-generated
        # lock (@parcel/watcher-linux-x64-glibc, @rollup/rollup-linux-x64-gnu) are now
        # pinned as explicit optionalDependencies in package.json, so npm records their
        # nodes and `npm ci` installs them on the linux builder. Verified in a
        # linux/amd64 container: `npm ci` succeeds and both native modules load.
        # Do NOT revert to `rm -rf package-lock.json && npm install` — that full
        # re-resolution is what made deploys ~8 min. See amplify-envs memory.
        - npm ci
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
