version: 1
backend:
  phases:
    build:
      commands:
        - rm -rf node_modules package-lock.json
        - npm install --no-ignore-optional
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules package-lock.json
        - npm install --no-ignore-optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'max-age=0, no-cache, no-store, must-revalidate'
        - key: 'Pragma'
          value: 'no-cache'
        - key: 'Expires'
          value: '0'
    - pattern: '*.html'
      headers:
        - key: 'Cache-Control'
          value: 'max-age=0, no-cache, no-store, must-revalidate'
    - pattern: 'assets/**/*'
      headers:
        - key: 'Cache-Control'
          value: 'max-age=31536000, immutable'
    # Block crawler indexing of admin pages at the HTTP layer.
    # Belt-and-suspenders alongside the runtime <meta name="robots"> in
    # AdminRoute.tsx — works even when JS doesn't execute. Two patterns
    # because Amplify's customHeaders glob does not match the bare /admin
    # path with admin/**.
    - pattern: 'admin'
      headers:
        - key: 'X-Robots-Tag'
          value: 'noindex, nofollow'
    - pattern: 'admin/**'
      headers:
        - key: 'X-Robots-Tag'
          value: 'noindex, nofollow'