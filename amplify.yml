version: 1
backend:
  phases:
    build:
      commands:
        # Keep the committed lockfile (do NOT `rm` it): with it present `npm install`
        # skips the expensive full-tree dependency RE-RESOLUTION (the bulk of the old
        # ~8 min), while still re-resolving platform optionals for linux so native
        # binaries install correctly (e.g. @parcel/watcher-linux-x64-glibc, whose
        # lockfile package node is missing under the macOS-generated lock — so plain
        # `npm ci` cannot install it and the build fails). node_modules is wiped for a
        # clean install.
        - rm -rf node_modules
        - npm install --no-ignore-optional
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules
        - npm install --no-ignore-optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
