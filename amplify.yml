version: 1
backend:
  phases:
    build:
      commands:
        # Deleting package-lock.json is REQUIRED, not wasteful: the committed
        # macOS-generated lockfile is platform-incomplete (no package node for
        # @parcel/watcher-linux-x64-glibc), so ANY lockfile-respecting install
        # (`npm ci`, or `npm install` with the lock present) fails to install the
        # linux native binary and ampx crashes at startup. Removing the lockfile
        # forces `npm install` to do a fresh, platform-correct re-resolution on the
        # linux builder. Do NOT "optimize" this by keeping the lockfile (broke deploys
        # in PR #238 `npm ci` and PR #239 `npm install`+lock). See amplify-envs memory.
        - rm -rf node_modules package-lock.json
        - npm install --no-ignore-optional
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules package-lock.json
        - npm install --no-ignore-optional
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
