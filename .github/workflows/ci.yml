name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The committed lockfile includes the Linux native optional packages used
      # by Rollup and Parcel. Keep installs deterministic and fail if package.json
      # and package-lock.json ever drift apart.
      - name: Install dependencies
        run: npm ci

      # amplify_outputs.json is generated at deploy time and gitignored. The app
      # only does Amplify.configure(outputs), so a stub is enough for the import
      # to resolve during typecheck/tests/lint.
      - name: Stub amplify_outputs.json
        run: echo '{}' > amplify_outputs.json

      - name: Lint
        run: npm run lint

      - name: Typecheck (app)
        run: npx tsc --noEmit

      # amplify/ is not covered by the root tsconfig — gate it explicitly so
      # backend type errors are caught here, not only at deploy.
      - name: Typecheck (amplify backend)
        run: npm run typecheck:amplify

      - name: Test
        run: npm test
